server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin proxy to the public Enka.Network profile API (avoids CORS).
    # The app requests /api/enka/<uid>; nginx fetches it server-side.
    location ~ ^/api/enka/(?<uid>\d+)$ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        set $enka_host enka.network;
        proxy_pass https://$enka_host/api/hsr/uid/$uid;
        proxy_set_header Host enka.network;
        proxy_set_header User-Agent "Stellaron-Metrics";
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # SPA fallback so client-side routes resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
