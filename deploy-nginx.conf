server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin proxy to the upstream profile backend (avoids its CORS lock).
    # The app requests /api/profile/<uid>; nginx forwards it server-side and
    # returns the exact shape the processors expect.
    location ~ ^/api/profile/(?<uid>\d+)$ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        set $profile_host 9di5b7zvtb.execute-api.us-west-2.amazonaws.com;
        proxy_pass https://$profile_host/prod/profile/$uid;
        proxy_set_header Host 9di5b7zvtb.execute-api.us-west-2.amazonaws.com;
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Spare: same-origin proxy to the public Enka.Network profile API.
    # The app requests /api/enka/<uid>; nginx fetches it server-side.
    location ~ ^/api/enka/(?<uid>\d+)$ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        set $enka_host enka.network;
        proxy_pass https://$enka_host/api/hsr/uid/$uid;
        proxy_set_header Host enka.network;
        proxy_set_header User-Agent "Stellaron-Metrics";
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # SPA fallback so client-side routes resolve. The app shell must revalidate
    # so a rebuild's new hashed assets are picked up (fingerprinted /assets/ stay
    # cached forever above).
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
