services:
  stellaron-metrics:
    build: .
    image: stellaron-metrics
    container_name: stellaron-metrics
    ports:
      # host:container. Reuses the freed NAT mapping public 10036 -> inner 8070,
      # so the site opens at http://163.123.180.81:10036/
      - "8070:80"
    restart: unless-stopped
